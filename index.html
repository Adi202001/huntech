<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Huntech Engineers Pvt. Ltd.</title>
    <link rel="icon" type="image/png" href="/assests/logo/logo.png" />
    <meta name="description" content="Huntech Engineers Pvt. Ltd. — precision packaging machinery manufacturer in Faridabad. VFFS machines, multi-head weighers, auger fillers & more. Built for Indian manufacturers." />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      html {
        scroll-behavior: smooth;
      }
      body {
        font-family: 'Inter', sans-serif;
        background-color: #f5f5f7; /* Apple-style light gray background */
        color: #1d1d1f; /* Apple-style almost black */
        -webkit-font-smoothing: antialiased;
      }
      /* Hide scrollbar for clean UI in horizontals */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none; 
        scrollbar-width: none; 
      }
      .glass-panel {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.3);
      }
      
      /* Scroll Animation Classes */
      .scroll-animate {
        opacity: 0;
        transform: translateY(40px);
        transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1), 
                    transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
      }
      .scroll-animate.visible {
        opacity: 1;
        transform: translateY(0);
      }
      .scroll-animate-left {
        opacity: 0;
        transform: translateX(-40px);
        transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1), 
                    transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
      }
      .scroll-animate-left.visible {
        opacity: 1;
        transform: translateX(0);
      }
      .scroll-animate-right {
        opacity: 0;
        transform: translateX(40px);
        transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1), 
                    transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
      }
      .scroll-animate-right.visible {
        opacity: 1;
        transform: translateX(0);
      }
      .scroll-animate-scale {
        opacity: 0;
        transform: scale(0.95);
        transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1), 
                    transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
      }
      .scroll-animate-scale.visible {
        opacity: 1;
        transform: scale(1);
      }
      
      /* Stagger delays for children */
      .stagger-1 { transition-delay: 0.1s; }
      .stagger-2 { transition-delay: 0.2s; }
      .stagger-3 { transition-delay: 0.3s; }
      .stagger-4 { transition-delay: 0.4s; }
      .stagger-5 { transition-delay: 0.5s; }
      
      /* Parallax effect */
      .parallax-slow {
        will-change: transform;
      }

      /* ========== SCROLL ANIMATIONS V2 ========== */

      /* Scroll progress bar */
      #scroll-progress-bar {
        position: fixed;
        top: 0; left: 0;
        height: 3px;
        width: 0%;
        background: linear-gradient(90deg, #ea580c, #f97316, #fbbf24);
        box-shadow: 0 0 10px rgba(234,88,12,0.6);
        z-index: 99999;
        transition: width 0.08s linear;
        pointer-events: none;
      }

      /* Blur-in (hero headings) */
      .anim-blur-in {
        opacity: 0;
        filter: blur(18px);
        transform: translateY(20px);
        transition: opacity 1.1s cubic-bezier(0.16,1,0.3,1),
                    filter 1.1s cubic-bezier(0.16,1,0.3,1),
                    transform 1.1s cubic-bezier(0.16,1,0.3,1);
      }
      .anim-blur-in.visible { opacity:1; filter:blur(0); transform:translateY(0); }

      /* Clip reveal left → right */
      .anim-clip-x {
        clip-path: inset(0 100% 0 0);
        transition: clip-path 1.3s cubic-bezier(0.76,0,0.24,1);
      }
      .anim-clip-x.visible { clip-path: inset(0 0% 0 0); }

      /* Clip reveal top → bottom */
      .anim-clip-y {
        clip-path: inset(0 0 100% 0);
        transition: clip-path 1s cubic-bezier(0.76,0,0.24,1);
      }
      .anim-clip-y.visible { clip-path: inset(0 0 0% 0); }

      /* Zoom + fade */
      .anim-zoom {
        opacity: 0;
        transform: scale(0.86) translateY(18px);
        transition: opacity 0.9s cubic-bezier(0.16,1,0.3,1),
                    transform 0.9s cubic-bezier(0.16,1,0.3,1);
      }
      .anim-zoom.visible { opacity:1; transform:scale(1) translateY(0); }

      /* 3D flip up */
      .anim-flip {
        opacity: 0;
        transform: perspective(800px) rotateX(28deg) translateY(32px);
        transition: opacity 0.85s cubic-bezier(0.16,1,0.3,1),
                    transform 0.85s cubic-bezier(0.16,1,0.3,1);
      }
      .anim-flip.visible { opacity:1; transform:perspective(800px) rotateX(0) translateY(0); }

      /* Timeline line draw */
      .anim-line {
        transform-origin: top center;
        transform: scaleY(0);
        transition: transform 2s cubic-bezier(0.16,1,0.3,1);
      }
      .anim-line.visible { transform: scaleY(1); }

      /* Marquee */
      @keyframes marquee {
        0%   { transform: translateX(0); }
        100% { transform: translateX(-50%); }
      }
      .animate-marquee { animation: marquee 30s linear infinite; }

      /* Float */
      @keyframes anim-float {
        0%,100% { transform: translateY(0); }
        50%      { transform: translateY(-10px); }
      }
      .anim-float      { animation: anim-float 5s ease-in-out infinite; }
      .anim-float-slow { animation: anim-float 8s ease-in-out infinite; }
      .anim-float-fast { animation: anim-float 3s ease-in-out infinite; }

      /* Shimmer text */
      @keyframes anim-shimmer {
        0%   { background-position: 200% center; }
        100% { background-position: -200% center; }
      }
      .shimmer-text {
        background: linear-gradient(90deg,#ea580c 0%,#f97316 25%,#fde68a 50%,#f97316 75%,#ea580c 100%);
        background-size: 200% auto;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        animation: anim-shimmer 1.8s cubic-bezier(0.4,0,0.2,1) 1 forwards;
      }

      /* Pulse orange glow */
      @keyframes anim-glow {
        0%,100% { box-shadow: 0 0 0 0 rgba(234,88,12,0); }
        50%      { box-shadow: 0 0 24px 6px rgba(234,88,12,0.18); }
      }
      .anim-glow { animation: anim-glow 3s ease-in-out infinite; }

      /* Stagger delay helpers */
      .delay-100 { transition-delay: 0.10s !important; }
      .delay-150 { transition-delay: 0.15s !important; }
      .delay-200 { transition-delay: 0.20s !important; }
      .delay-300 { transition-delay: 0.30s !important; }
      .delay-400 { transition-delay: 0.40s !important; }
      .delay-500 { transition-delay: 0.50s !important; }
      .delay-600 { transition-delay: 0.60s !important; }
      .delay-700 { transition-delay: 0.70s !important; }

      /* Magnetic button */
      .magnetic { transition: transform 0.35s cubic-bezier(0.16,1,0.3,1); }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "@google/genai": "https://esm.sh/@google/genai@^1.33.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.561.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="scroll-progress-bar"></div>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
  <script>
    // Scroll progress bar
    const bar = document.getElementById('scroll-progress-bar');
    window.addEventListener('scroll', () => {
      const h = document.documentElement;
      const pct = (h.scrollTop / (h.scrollHeight - h.clientHeight)) * 100;
      if (bar) bar.style.width = pct + '%';
    }, { passive: true });

    // Magnetic buttons
    document.addEventListener('mousemove', (e) => {
      document.querySelectorAll('.magnetic').forEach(el => {
        const rect = el.getBoundingClientRect();
        const cx = rect.left + rect.width / 2;
        const cy = rect.top + rect.height / 2;
        const dx = e.clientX - cx;
        const dy = e.clientY - cy;
        const dist = Math.sqrt(dx*dx + dy*dy);
        const range = 120;
        if (dist < range) {
          const pull = (1 - dist / range) * 10;
          el.style.transform = `translate(${dx/dist*pull}px, ${dy/dist*pull}px)`;
        } else {
          el.style.transform = '';
        }
      });
    });
  </script>
</body>
</html>
